<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');

  body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at center, #4a0000 0%, #1a0000 100%);
    color: white;
    text-align: center;
    overflow-x: hidden;
  }

  /* Music Start Overlay */
  #music-prompt {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #000;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: 1s ease-out;
  }

  .start-btn {
    padding: 20px 50px;
    font-size: 26px;
    background: #ffb6c1;
    color: #4a0000;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Dancing Script', cursive;
    font-weight: bold;
    box-shadow: 0 0 30px #ffb6c1;
    transition: 0.3s;
  }

  /* Header Section */
  header {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  #typing-container {
    height: 80px;
    margin-bottom: 20px;
  }

  #typing {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(40px, 8vw, 70px);
    color: #ffb6c1;
    text-shadow: 0 0 20px rgba(255,182,193,0.9);
    border-right: 4px solid #ffb6c1;
    padding-right: 12px;
  }

  .subtitle {
    font-style: italic;
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: #ffd700;
    opacity: 0;
    margin-top: 20px;
  }

  /* Big Heart Gallery */
  .gallery-section {
    padding: 80px 20px;
    background: rgba(0,0,0,0.3);
  }

  .heart-container {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    max-width: 1200px;
    margin: 0 auto;
  }

  .heart {
    width: 320px; 
    height: 320px;
    background-size: cover;
    background-position: center;
    clip-path: polygon(50% 15%, 61% 0%, 75% 0%, 100% 25%, 100% 62%, 50% 100%, 0% 62%, 0% 25%, 25% 0%, 39% 0%);
    box-shadow: 0 0 40px rgba(255, 105, 180, 0.4);
    transition: all 0.6s ease;
    filter: brightness(0.9);
  }

  /* Use your provided images */

  .pic2 { background-image: url('https://image2url.com/r2/default/images/1773762438350-7cac9fed-de0b-4026-95cb-3832baad1660.jpg'); }
  .pic3 { background-image: url('https://image2url.com/r2/default/images/1773762478753-4fe4a602-9a41-43d0-9837-0e96311da47e.jpg'); }

  /* Appreciation Text Blocks */
  .appreciation-section {
    max-width: 800px;
    margin: 0 auto;
    padding: 100px 20px;
    line-height: 2.2;
  }

  .appreciation-section h2 {
    font-family: 'Playfair Display', serif;
    color: #ffb6c1;
    font-size: 38px;
    margin-bottom: 25px;
  }

  .appreciation-section p {
    font-size: 22px;
    margin-bottom: 60px;
    opacity: 0;
    transform: translateY(40px);
    transition: 1.2s all ease;
    color: #fce4ec;
  }

  .reveal { opacity: 1 !important; transform: translateY(0) !important; }
